# A simple test experiment configuration with fewer iterations
# for quicker testing

# Set up the configuration composition
defaults:
  - algorithm: cql        # Use CQL for offline algorithm
  - algorithm@online_algo: sacif      # Use SACIF for online algorithm
  - environment: pensimenv # Use PenSim environment
  - _self_                # Apply this config last

# Experiment name and parameters
exp_name: "simple_test_experiment"
exp_length: 50  # Number of steps for online learning
random_seed_range: 3  # Number of seeds to run
random_seed: 0  # Initial random seed (will be updated during execution)

# Algorithm configuration overrides
model:
  use_layer_norm: true

# Expert intervention configuration
intervention:
  rate: 0.1
  length: 3

# Exploration configuration
exploration:
  use_explorer: true
  explorer_epsilon: 0.2

# Policy initialization
policy_init:
  offline_init_policy: true
  use_offline_pretrained_model: false

# Training parameters
training:
  offline_pretrain_steps: 500
  offline_pretrain_epoch: 1
  online_steps: 500
  online_epoch: 50